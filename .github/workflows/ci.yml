name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run verify

  fallow-audit:
    name: Fallow audit
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: npx fallow@3.5.0 audit --base origin/main

  verify-musl:
    name: Verify (Linux x64 musl)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v7
      - name: Verify atomic publication on musl
        run: >-
          docker run --rm
          --volume "${{ github.workspace }}:/workspace"
          --workdir /workspace
          oven/bun:1.3.14-alpine
          sh -lc 'bun install --frozen-lockfile && bun test ./packages/pull-transfer/test/atomic-publish.test.ts'
